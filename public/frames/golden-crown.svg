<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" overflow="visible">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="35%" stop-color="#f59e0b"/>
      <stop offset="70%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="goldSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#fbbf24" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="jewelGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="40%" stop-color="#fbbf24"/>
      <stop offset="75%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </radialGradient>
    <linearGradient id="pillarGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="50%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
  </defs>
  <!-- Decorative base -->
  <rect x="10" y="76" width="80" height="7" rx="3.5" fill="url(#goldGrad)" stroke="#92400e" stroke-width="1"/>
  <rect x="10" y="76" width="80" height="7" rx="3.5" fill="url(#goldSheen)"/>
  <!-- Left pillar -->
  <rect x="14" y="46" width="6" height="30" rx="3" fill="url(#pillarGrad)" stroke="#92400e" stroke-width="0.8"/>
  <rect x="14" y="46" width="6" height="30" rx="3" fill="url(#goldSheen)"/>
  <!-- Right pillar -->
  <rect x="80" y="46" width="6" height="30" rx="3" fill="url(#pillarGrad)" stroke="#92400e" stroke-width="0.8"/>
  <rect x="80" y="46" width="6" height="30" rx="3" fill="url(#goldSheen)"/>
  <!-- Side decorative flanges -->
  <path d="M8 48 L14 44 L14 48 Z" fill="#f59e0b" stroke="#d97706" stroke-width="0.5"/>
  <path d="M86 44 L92 48 L86 48 Z" fill="#f59e0b" stroke="#d97706" stroke-width="0.5"/>
  <!-- Horizontal band -->
  <rect x="12" y="38" width="76" height="5" rx="2.5" fill="url(#goldGrad)" stroke="#92400e" stroke-width="0.8"/>
  <rect x="12" y="38" width="76" height="5" rx="2.5" fill="url(#goldSheen)"/>
  <!-- 5 Crown points -->
  <polygon points="14,38 20,16 26,38" fill="url(#goldGrad)" stroke="#92400e" stroke-width="1"/>
  <polygon points="14,38 20,16 26,38" fill="url(#goldSheen)"/>
  <polygon points="30,38 38,8 46,38" fill="url(#goldGrad)" stroke="#92400e" stroke-width="1"/>
  <polygon points="30,38 38,8 46,38" fill="url(#goldSheen)"/>
  <polygon points="44,38 50,4 56,38" fill="url(#goldGrad)" stroke="#92400e" stroke-width="1"/>
  <polygon points="44,38 50,4 56,38" fill="url(#goldSheen)"/>
  <polygon points="54,38 62,8 70,38" fill="url(#goldGrad)" stroke="#92400e" stroke-width="1"/>
  <polygon points="54,38 62,8 70,38" fill="url(#goldSheen)"/>
  <polygon points="74,38 80,16 86,38" fill="url(#goldGrad)" stroke="#92400e" stroke-width="1"/>
  <polygon points="74,38 80,16 86,38" fill="url(#goldSheen)"/>
  <!-- Center jewel -->
  <circle cx="50" cy="28" r="6" fill="url(#jewelGrad)" stroke="#92400e" stroke-width="1.2"/>
  <circle cx="48.5" cy="26.5" r="1.5" fill="#fde68a" opacity="0.7"/>
  <!-- Point tip jewels -->
  <circle cx="38" cy="12" r="2" fill="url(#jewelGrad)" stroke="#92400e" stroke-width="0.6"/>
  <circle cx="62" cy="12" r="2" fill="url(#jewelGrad)" stroke="#92400e" stroke-width="0.6"/>
  <circle cx="50" cy="8" r="2.2" fill="url(#jewelGrad)" stroke="#92400e" stroke-width="0.6"/>
  <!-- Base decorative dots -->
  <circle cx="28" cy="79" r="1.8" fill="#fbbf24" opacity="0.5"/>
  <circle cx="50" cy="79" r="1.8" fill="#fbbf24" opacity="0.5"/>
  <circle cx="72" cy="79" r="1.8" fill="#fbbf24" opacity="0.5"/>
</svg>