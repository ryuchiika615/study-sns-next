  <polygon points="16,26 10,30 16,34 22,30" fill="#60a5fa" opacity="0.8"/>
  <!-- Decorative dots at hexagon vertices -->
  <circle cx="50" cy="6" r="2" fill="#3b82f6"/>
  <circle cx="82" cy="28" r="2" fill="#3b82f6"/>
  <circle cx="82" cy="72" r="2" fill="#3b82f6"/>
  <circle cx="50" cy="94" r="2" fill="#3b82f6"/>
