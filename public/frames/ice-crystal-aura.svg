<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" overflow="visible">
  <defs>
    <linearGradient id="crystalGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bae6fd"/>
      <stop offset="50%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="crystalGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="crystalGrad3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="50%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <radialGradient id="shardGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0"/>
    </radialGradient>
    <filter id="crystalGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sharpGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <polygon id="shardLg" points="0,-18 5,-6 18,0 5,6 0,18 -5,6 -18,0 -5,-6"/>
    <polygon id="shardMd" points="0,-12 3,-4 12,0 3,4 0,12 -3,4 -12,0 -3,-4"/>
    <polygon id="shardSm" points="0,-8 2,-3 8,0 2,3 0,8 -2,3 -8,0 -2,-3"/>
    <path id="shardLong" d="M0 0 L-3 -10 L0 -16 L3 -10 Z"/>
    <path id="shardWide" d="M0 0 L-5 -12 L0 -18 L5 -12 Z"/>
  </defs>
  <g filter="url(#sharpGlow)">
