      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#8b5cf6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
