<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" overflow="visible">
  <defs>
    <linearGradient id="speedLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#60a5fa" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="speedLineR" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#60a5fa" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <radialGradient id="sparkleGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1e40af" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Left speed lines -->
  <line x1="2" y1="35" x2="28" y2="35" stroke="url(#speedLine)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="5" y1="45" x2="25" y2="45" stroke="url(#speedLine)" stroke-width="1" stroke-linecap="round"/>
  <line x1="8" y1="55" x2="22" y2="55" stroke="url(#speedLine)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="3" y1="65" x2="27" y2="65" stroke="url(#speedLine)" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Right speed lines -->
  <line x1="72" y1="35" x2="98" y2="35" stroke="url(#speedLineR)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="75" y1="45" x2="95" y2="45" stroke="url(#speedLineR)" stroke-width="1" stroke-linecap="round"/>
  <line x1="78" y1="55" x2="92" y2="55" stroke="url(#speedLineR)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="73" y1="65" x2="97" y2="65" stroke="url(#speedLineR)" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Open book - left page -->
  <path d="M30 72 L30 58 Q50 52 50 58 L50 72 Q40 68 30 72 Z" fill="url(#bookGrad)" stroke="#1e40af" stroke-width="0.8" opacity="0.85"/>
  <!-- Open book - right page -->
  <path d="M70 72 L70 58 Q50 52 50 58 L50 72 Q60 68 70 72 Z" fill="url(#bookGrad)" stroke="#1e40af" stroke-width="0.8" opacity="0.85"/>
  <!-- Book spine -->
  <line x1="50" y1="52" x2="50" y2="72" stroke="#1e40af" stroke-width="1.5"/>
  <!-- Page text lines -->
  <line x1="34" y1="62" x2="46" y2="59" stroke="#93c5fd" stroke-width="0.5" opacity="0.5"/>
  <line x1="34" y1="65" x2="46" y2="62" stroke="#93c5fd" stroke-width="0.5" opacity="0.5"/>
  <line x1="34" y1="68" x2="46" y2="65" stroke="#93c5fd" stroke-width="0.5" opacity="0.5"/>
  <line x1="54" y1="59" x2="66" y2="62" stroke="#93c5fd" stroke-width="0.5" opacity="0.5"/>
  <line x1="54" y1="62" x2="66" y2="65" stroke="#93c5fd" stroke-width="0.5" opacity="0.5"/>
  <line x1="54" y1="65" x2="66" y2="68" stroke="#93c5fd" stroke-width="0.5" opacity="0.5"/>
  <!-- Magic sparkle at top -->
  <circle cx="50" cy="22" r="8" fill="url(#sparkleGrad)"/>
  <polygon points="50,10 52,18 50,16 48,18" fill="#93c5fd" opacity="0.8"/>
  <polygon points="50,10 52,18 50,16 48,18" fill="#93c5fd" opacity="0.8" transform="rotate(90,50,22)"/>
  <polygon points="50,10 52,18 50,16 48,18" fill="#60a5fa" opacity="0.6" transform="rotate(45,50,22)"/>
  <polygon points="50,10 52,18 50,16 48,18" fill="#60a5fa" opacity="0.6" transform="rotate(135,50,22)"/>
  <!-- Small magic particles -->
  <circle cx="42" cy="30" r="1" fill="#93c5fd" opacity="0.6"/>
  <circle cx="58" cy="28" r="1.2" fill="#60a5fa" opacity="0.5"/>
  <circle cx="38" cy="20" r="0.8" fill="#3b82f6" opacity="0.5"/>
  <circle cx="62" cy="22" r="0.8" fill="#3b82f6" opacity="0.5"/>
</svg>