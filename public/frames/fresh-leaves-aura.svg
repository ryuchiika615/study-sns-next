<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" overflow="visible">
  <defs>
    <linearGradient id="leafGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <linearGradient id="leafGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bbf7d0"/>
      <stop offset="50%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="leafGrad3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="50%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <radialGradient id="leafGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#166534" stop-opacity="0"/>
    </radialGradient>
    <filter id="freshGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="leafFilter" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <path id="leafLg" d="M0 0 C-10 -7 -16 -20 -10 -30 C-4 -38 12 -34 14 -22 C16 -12 8 -4 0 0Z"/>
    <path id="leafMd" d="M0 0 C-7 -5 -11 -14 -7 -21 C-3 -27 8 -24 10 -16 C12 -8 6 -3 0 0Z"/>
    <path id="leafSm" d="M0 0 C-5 -3 -7 -9 -5 -14 C-1 -18 6 -16 7 -10 C8 -6 4 -2 0 0Z"/>
    <path id="vine" d="M0 0 Q6 -12 0 -24 Q-6 -12 0 0Z"/>
  </defs>
  <g filter="url(#leafFilter)">
    <g transform="translate(6,14)">
      <use href="#leafLg" transform="rotate(-30) scale(0.8)" fill="url(#leafGrad1)" opacity="0.9"/>
    </g>
    <g transform="translate(94,86)">
      <use href="#leafLg" transform="rotate(150) scale(0.8)" fill="url(#leafGrad2)" opacity="0.9"/>
    </g>
    <g transform="translate(94,14)">
