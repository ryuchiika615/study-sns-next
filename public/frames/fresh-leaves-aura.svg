      <use href="#leafMd" transform="rotate(210) scale(0.75)" fill="url(#leafGrad2)" opacity="0.85"/>
    </g>
  </g>
  <g filter="url(#freshGlow)">
    <g transform="translate(4,38)">
      <use href="#leafMd" transform="rotate(20) scale(0.9)" fill="url(#leafGrad3)" opacity="0.85"/>
