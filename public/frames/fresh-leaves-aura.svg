    </g>
    <g transform="translate(30,4)">
      <use href="#leafSm" transform="rotate(0) scale(0.5)" fill="url(#leafGrad1)"/>
    </g>
    <g transform="translate(70,4)">
      <use href="#leafSm" transform="rotate(0) scale(0.5)" fill="url(#leafGrad2)"/>
    </g>
  </g>
  <g fill="#166534" opacity="0.4">
    <circle cx="18" cy="10" r="1.2"/>
    <circle cx="82" cy="10" r="1.2"/>
    <circle cx="10" cy="18" r="1.2"/>
    <circle cx="90" cy="18" r="1.2"/>
    <circle cx="10" cy="82" r="1.2"/>
    <circle cx="90" cy="82" r="1.2"/>
    <circle cx="18" cy="90" r="1.2"/>
    <circle cx="82" cy="90" r="1.2"/>
  </g>
  <g fill="#22c55e" opacity="0.3">
    <circle cx="28" cy="6" r="0.8"/>
    <circle cx="72" cy="6" r="0.8"/>
    <circle cx="6" cy="28" r="0.8"/>
    <circle cx="94" cy="28" r="0.8"/>
    <circle cx="6" cy="72" r="0.8"/>
    <circle cx="94" cy="72" r="0.8"/>
    <circle cx="28" cy="94" r="0.8"/>
    <circle cx="72" cy="94" r="0.8"/>
  </g>
