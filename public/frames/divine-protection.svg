<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" overflow="visible">
  <defs>
    <radialGradient id="divineGlow" cx="50%" cy="40%" r="55%">
      <stop offset="10%" stop-color="#fef3c7" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#fbbf24" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="divineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="30%" stop-color="#fbbf24"/>
      <stop offset="70%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <filter id="divineBlur">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starBlur">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#divineGlow)"/>
  <g filter="url(#divineBlur)">
    <polygon points="50,8 56,28 78,28 60,42 68,62 50,50 32,62 40,42 22,28 44,28" fill="url(#divineGrad)" stroke="#d97706" stroke-width="0.8" opacity="0.75"/>
  </g>
  <g fill="none" stroke="#fbbf24" stroke-width="0.5" opacity="0.4">
    <circle cx="50" cy="38" r="20"/>
    <circle cx="50" cy="38" r="25" stroke-dasharray="3 4"/>
    <circle cx="50" cy="38" r="30" stroke-dasharray="1 6"/>
  </g>
  <g fill="#fef3c7" opacity="0.4" filter="url(#starBlur)">
    <polygon points="50,2 51.5,6 56,6 52.5,9 54,13 50,10.5 46,13 47.5,9 44,6 48.5,6" opacity="0.8"/>
    <circle cx="30" cy="20" r="1.2"/>
    <circle cx="70" cy="20" r="1.2"/>
    <circle cx="18" cy="38" r="1"/>
    <circle cx="82" cy="38" r="1"/>
    <circle cx="25" cy="55" r="0.8"/>
    <circle cx="75" cy="55" r="0.8"/>
  </g>
  <g fill="none" stroke="#d97706" stroke-width="0.3" opacity="0.25">
    <line x1="50" y1="8" x2="50" y2="18"/>
    <line x1="35" y1="15" x2="40" y2="22"/>
    <line x1="65" y1="15" x2="60" y2="22"/>
    <line x1="22" y1="28" x2="32" y2="32"/>
    <line x1="78" y1="28" x2="68" y2="32"/>
  </g>
</svg>