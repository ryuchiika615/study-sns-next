<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" overflow="visible">
  <defs>
    <linearGradient id="crystalLine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="diamondGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <!-- Octagonal frame - outer -->
  <polygon points="30,10 70,10 90,30 90,70 70,90 30,90 10,70 10,30"
           fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>
  <!-- Octagonal frame - middle -->
  <polygon points="33,15 67,15 85,33 85,67 67,85 33,85 15,67 15,33"
           fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.35"/>
  <!-- Octagonal frame - inner -->
  <polygon points="36,20 64,20 80,36 80,64 64,80 36,80 20,64 20,36"
           fill="none" stroke="#7c3aed" stroke-width="0.8" opacity="0.3"/>
  <!-- Corner diamond accents - top -->
  <polygon points="50,10 53,16 50,14 47,16" fill="url(#diamondGrad)" opacity="0.6"/>
  <!-- Corner diamond accents - right -->
  <polygon points="90,50 84,53 86,50 84,47" fill="url(#diamondGrad)" opacity="0.6"/>
  <!-- Corner diamond accents - bottom -->
  <polygon points="50,90 47,84 50,86 53,84" fill="url(#diamondGrad)" opacity="0.6"/>
  <!-- Corner diamond accents - left -->
  <polygon points="10,50 16,47 14,50 16,53" fill="url(#diamondGrad)" opacity="0.6"/>
  <!-- Translucent connecting lines -->
  <line x1="30" y1="10" x2="50" y2="10" stroke="#c4b5fd" stroke-width="0.5" opacity="0.3"/>
  <line x1="70" y1="10" x2="90" y2="30" stroke="#c4b5fd" stroke-width="0.5" opacity="0.3"/>
  <line x1="90" y1="30" x2="90" y2="50" stroke="#c4b5fd" stroke-width="0.5" opacity="0.3"/>
  <line x1="90" y1="70" x2="70" y2="90" stroke="#c4b5fd" stroke-width="0.5" opacity="0.3"/>
  <line x1="70" y1="90" x2="50" y2="90" stroke="#c4b5fd" stroke-width="0.5" opacity="0.3"/>
  <line x1="30" y1="90" x2="10" y2="70" stroke="#c4b5fd" stroke-width="0.5" opacity="0.3"/>
  <line x1="10" y1="70" x2="10" y2="50" stroke="#c4b5fd" stroke-width="0.5" opacity="0.3"/>
  <line x1="10" y1="30" x2="30" y2="10" stroke="#c4b5fd" stroke-width="0.5" opacity="0.3"/>
  <!-- Small corner diamonds -->
  <polygon points="30,10 33,15 30,13 27,15" fill="#a78bfa" opacity="0.4"/>
  <polygon points="70,10 73,15 70,13 67,15" fill="#a78bfa" opacity="0.4"/>
  <polygon points="90,30 85,33 87,30 85,27" fill="#a78bfa" opacity="0.4"/>
  <polygon points="90,70 85,67 87,70 85,73" fill="#a78bfa" opacity="0.4"/>
  <polygon points="70,90 67,85 70,87 73,85" fill="#a78bfa" opacity="0.4"/>
  <polygon points="30,90 27,85 30,87 33,85" fill="#a78bfa" opacity="0.4"/>
  <polygon points="10,70 15,67 13,70 15,73" fill="#a78bfa" opacity="0.4"/>
  <polygon points="10,30 15,33 13,30 15,27" fill="#a78bfa" opacity="0.4"/>
  <!-- Center geometric pattern -->
  <polygon points="42,42 50,38 58,42 58,58 50,62 42,58" fill="none" stroke="#c4b5fd" stroke-width="0.6" opacity="0.25"/>
</svg>