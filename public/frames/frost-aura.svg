    <polygon id="frostStar" points="0,-10 2,-4 8,0 2,4 0,10 -2,4 -8,0 -2,-4"/>
    <polygon id="frostSm" points="0,-7 2,-3 5,0 2,3 0,7 -2,3 -5,0 -2,-3"/>
