<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" overflow="visible">
  <defs>
    <linearGradient id="bookGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="50%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="goldEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <radialGradient id="bookGlow" cx="50%" cy="40%" r="55%">
      <stop offset="15%" stop-color="#60a5fa" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#1e40af" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#172554" stop-opacity="0"/>
    </radialGradient>
    <filter id="bookBlur">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#bookGlow)"/>
  <g filter="url(#bookBlur)">
    <rect x="22" y="12" width="56" height="76" rx="3" fill="url(#bookGrad)" stroke="#1e3a8a" stroke-width="1.2"/>
    <rect x="22" y="12" width="56" height="76" rx="3" fill="none" stroke="url(#goldEdge)" stroke-width="0.8" opacity="0.6"/>
    <rect x="28" y="18" width="44" height="64" rx="2" fill="#172554" opacity="0.5"/>
  </g>
  <g fill="none" stroke="#fbbf24" stroke-width="0.6" opacity="0.5">
    <rect x="34" y="24" width="32" height="52" rx="1.5"/>
    <line x1="34" y1="36" x2="66" y2="36"/>
    <line x1="34" y1="48" x2="66" y2="48"/>
    <line x1="34" y1="60" x2="66" y2="60"/>
  </g>
  <g fill="#60a5fa" opacity="0.35">
    <text x="38" y="33" font-family="serif" font-size="4">ABC</text>
    <text x="38" y="45" font-family="serif" font-size="4">DEF</text>
    <text x="38" y="57" font-family="serif" font-size="4">GHI</text>
  </g>
  <circle cx="50" cy="30" r="4" fill="url(#goldEdge)" stroke="#92400e" stroke-width="0.6"/>
  <circle cx="50" cy="30" r="1.5" fill="#fef3c7" opacity="0.5"/>
  <g fill="#fbbf24" opacity="0.3">
    <circle cx="30" cy="50" r="1"/>
    <circle cx="70" cy="50" r="1"/>
    <circle cx="50" cy="75" r="0.8"/>
  </g>
  <g fill="none" stroke="#1e3a8a" stroke-width="0.3" opacity="0.2" stroke-dasharray="2 5">
    <circle cx="50" cy="50" r="42"/>
  </g>
</svg>