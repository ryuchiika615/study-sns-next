<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" overflow="visible">
  <defs>
    <linearGradient id="leafGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="leafGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="leafGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b91c1c"/>
      <stop offset="50%" stop-color="#7f1d1d"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </linearGradient>
    <radialGradient id="leafGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7f1d1d" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="leafFilter" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <path id="mapleLg" d="M0 0 L-5 -10 L-3 -13 L-8 -17 L-10 -14 L-13 -20 L-8 -18 L-5 -24 L0 -16 L3 -20 L5 -24 L5 -18 L13 -20 L10 -14 L8 -17 L3 -10 L5 -6 Z"/>
    <path id="mapleMd" d="M0 0 L-4 -8 L-2 -10 L-6 -14 L-8 -12 L-10 -18 L-6 -16 L-4 -20 L0 -14 L2 -18 L4 -20 L4 -16 L10 -18 L8 -12 L6 -14 L2 -8 L4 -6 Z"/>
    <path id="mapleSm" d="M0 0 L-3 -6 L-1 -8 L-4 -10 L-6 -9 L-7 -13 L-4 -12 L-3 -15 L0 -10 L2 -13 L3 -15 L3 -12 L7 -13 L6 -9 L4 -10 L1 -8 L3 -5 Z"/>
    <path id="oakLeaf" d="M0 0 C-8 -5 -12 -15 -8 -22 C-4 -28 4 -26 6 -18 C8 -10 4 -4 0 0Z"/>
  </defs>
  <g filter="url(#leafFilter)">
    <g transform="translate(12,14)" opacity="0.9">
