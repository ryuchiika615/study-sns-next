      <use href="#oakLeaf" transform="rotate(45) scale(0.9)" fill="url(#leafGrad3)"/>
    </g>
    <g transform="translate(92,62)">
      <use href="#oakLeaf" transform="rotate(225) scale(0.9)" fill="url(#leafGrad1)"/>
