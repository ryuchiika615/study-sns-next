    </g>
    <g transform="translate(88,86)" opacity="0.9">
      <use href="#mapleLg" transform="rotate(195) scale(0.9)" fill="url(#leafGrad2)"/>
    </g>
    <g transform="translate(86,14)" opacity="0.85">
      <use href="#mapleMd" transform="rotate(30) scale(0.85)" fill="url(#leafGrad1)"/>
    </g>
    <g transform="translate(14,86)" opacity="0.85">
      <use href="#mapleMd" transform="rotate(210) scale(0.85)" fill="url(#leafGrad2)"/>
    </g>
  </g>
  <g filter="url(#glow)" opacity="0.8">
