    <circle cx="92" cy="75" r="2"/>
    <circle cx="18" cy="10" r="1.2"/>
    <circle cx="82" cy="10" r="1.2"/>
    <circle cx="30" cy="5" r="1"/>
    <circle cx="70" cy="5" r="1"/>
    <circle cx="5" cy="80" r="1.5"/>
    <circle cx="95" cy="20" r="1.5"/>
  </g>
  <g fill="#dc2626" opacity="0.3">
