<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" overflow="visible">
  <defs>
    <linearGradient id="ironGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6b7280"/>
      <stop offset="30%" stop-color="#4b5563"/>
      <stop offset="60%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="ironSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9ca3af" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#6b7280" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#374151" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="pointGrad" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>
    <filter id="ironGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Base band -->
  <rect x="12" y="38" width="76" height="6" rx="3" fill="url(#ironGrad)" stroke="#1f2937" stroke-width="1"/>
  <rect x="12" y="38" width="76" height="6" rx="3" fill="url(#ironSheen)"/>
  <!-- Left pillar -->
  <rect x="14" y="48" width="5" height="34" rx="2" fill="#374151" stroke="#1f2937" stroke-width="0.8"/>
  <rect x="14" y="48" width="5" height="34" rx="2" fill="url(#ironSheen)"/>
  <!-- Right pillar -->
  <rect x="81" y="48" width="5" height="34" rx="2" fill="#374151" stroke="#1f2937" stroke-width="0.8"/>
  <rect x="81" y="48" width="5" height="34" rx="2" fill="url(#ironSheen)"/>
  <!-- Bottom crossbar -->
  <rect x="14" y="78" width="72" height="5" rx="2.5" fill="url(#ironGrad)" stroke="#1f2937" stroke-width="0.8"/>
  <!-- Crown 5 points -->
  <polygon points="14,38 20,18 26,38" fill="url(#pointGrad)" stroke="#1f2937" stroke-width="0.8" filter="url(#ironGlow)"/>
  <polygon points="28,38 35,10 42,38" fill="url(#pointGrad)" stroke="#1f2937" stroke-width="0.8" filter="url(#ironGlow)"/>
  <polygon points="42,38 50,6 58,38" fill="url(#pointGrad)" stroke="#1f2937" stroke-width="0.8" filter="url(#ironGlow)"/>
  <polygon points="58,38 65,10 72,38" fill="url(#pointGrad)" stroke="#1f2937" stroke-width="0.8" filter="url(#ironGlow)"/>
  <polygon points="74,38 80,18 86,38" fill="url(#pointGrad)" stroke="#1f2937" stroke-width="0.8" filter="url(#ironGlow)"/>
  <!-- Metallic sheen overlay on crown -->
  <path d="M14 38 L20 18 L26 38 L35 10 L42 38 L50 6 L58 38 L65 10 L72 38 L80 18 L86 38 Z" fill="none" stroke="#9ca3af" stroke-width="0.5" opacity="0.4"/>
  <!-- Center emblem -->
  <polygon points="50,28 53,34 50,32 47,34" fill="#9ca3af" opacity="0.7"/>
  <!-- Decorative rivets -->
  <circle cx="20" cy="41" r="1.2" fill="#9ca3af" opacity="0.5"/>
  <circle cx="35" cy="41" r="1.2" fill="#9ca3af" opacity="0.5"/>
  <circle cx="65" cy="41" r="1.2" fill="#9ca3af" opacity="0.5"/>
  <circle cx="80" cy="41" r="1.2" fill="#9ca3af" opacity="0.5"/>
</svg>