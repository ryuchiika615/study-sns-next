<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" overflow="visible">
  <defs>
    <polygon id="crystal" points="0,-12 3,-4 12,0 3,4 0,12 -3,4 -12,0 -3,-4"/>
    <polygon id="star" points="0,-8 2,-3 8,0 2,3 0,8 -2,3 -8,0 -2,-3"/>
  </defs>
  <g opacity="0.3" fill="none" stroke="#93c5fd" stroke-width="0.5">
    <circle cx="50" cy="50" r="38"/>
    <circle cx="50" cy="50" r="28"/>
  </g>
  <g fill="#1e3a5f" opacity="0.5">
    <use href="#crystal" x="10" y="10" transform="rotate(0 10 10) scale(0.9)"/>
    <use href="#crystal" x="90" y="10" transform="rotate(90 90 10) scale(0.9)"/>
    <use href="#crystal" x="10" y="90" transform="rotate(270 10 90) scale(0.9)"/>
    <use href="#crystal" x="90" y="90" transform="rotate(180 90 90) scale(0.9)"/>
  </g>
  <g fill="#3b82f6" opacity="0.6">
    <use href="#star" x="50" y="5" transform="scale(0.8)"/>
    <use href="#star" x="5" y="50" transform="scale(0.8)"/>
    <use href="#star" x="95" y="50" transform="scale(0.8)"/>
    <use href="#star" x="50" y="95" transform="scale(0.8)"/>
  </g>
  <g fill="#60a5fa" opacity="0.7">
    <use href="#star" x="25" y="5" transform="scale(0.6)"/>
    <use href="#star" x="75" y="5" transform="scale(0.6)"/>
    <use href="#star" x="5" y="25" transform="scale(0.6)"/>
    <use href="#star" x="95" y="25" transform="scale(0.6)"/>
    <use href="#star" x="5" y="75" transform="scale(0.6)"/>
    <use href="#star" x="95" y="75" transform="scale(0.6)"/>
    <use href="#star" x="25" y="95" transform="scale(0.6)"/>
    <use href="#star" x="75" y="95" transform="scale(0.6)"/>
  </g>
  <g fill="#93c5fd" opacity="0.4">
    <circle cx="10" cy="30" r="1.5"/><circle cx="90" cy="30" r="1.5"/>
    <circle cx="10" cy="70" r="1.5"/><circle cx="90" cy="70" r="1.5"/>
    <circle cx="30" cy="10" r="1.5"/><circle cx="70" cy="10" r="1.5"/>
    <circle cx="30" cy="90" r="1.5"/><circle cx="70" cy="90" r="1.5"/>
    <circle cx="50" cy="10" r="1"/><circle cx="10" cy="50" r="1"/>
    <circle cx="90" cy="50" r="1"/><circle cx="50" cy="90" r="1"/>
  </g>
  <g fill="none" stroke="#93c5fd" stroke-width="0.8" opacity="0.3">
    <line x1="5" y1="15" x2="15" y2="5"/>
    <line x1="95" y1="15" x2="85" y2="5"/>
    <line x1="5" y1="85" x2="15" y2="95"/>
    <line x1="95" y1="85" x2="85" y2="95"/>
  </g>
</svg>
