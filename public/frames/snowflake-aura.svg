<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" overflow="visible">
  <defs>
    <linearGradient id="iceGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="iceGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <radialGradient id="crystalGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1e3a5f" stop-opacity="0"/>
    </radialGradient>
    <filter id="iceGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="frostGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <g id="snowflake6">
      <line x1="0" y1="-14" x2="0" y2="14" stroke-width="1.5"/>
      <line x1="-12.1" y1="-7" x2="12.1" y2="7" stroke-width="1.5"/>
      <line x1="-12.1" y1="7" x2="12.1" y2="-7" stroke-width="1.5"/>
      <line x1="0" y1="-10" x2="3" y2="-13" stroke-width="1"/>
      <line x1="0" y1="-10" x2="-3" y2="-13" stroke-width="1"/>
      <line x1="0" y1="10" x2="3" y2="13" stroke-width="1"/>
      <line x1="0" y1="10" x2="-3" y2="13" stroke-width="1"/>
      <line x1="-8.6" y1="-5" x2="-11" y2="-8" stroke-width="1"/>
      <line x1="-8.6" y1="-5" x2="-12" y2="-3" stroke-width="1"/>
      <line x1="8.6" y1="5" x2="11" y2="8" stroke-width="1"/>
      <line x1="8.6" y1="5" x2="12" y2="3" stroke-width="1"/>
      <line x1="-8.6" y1="5" x2="-11" y2="8" stroke-width="1"/>
      <line x1="-8.6" y1="5" x2="-12" y2="3" stroke-width="1"/>
      <line x1="8.6" y1="-5" x2="11" y2="-8" stroke-width="1"/>
      <line x1="8.6" y1="-5" x2="12" y2="-3" stroke-width="1"/>
      <circle cx="0" cy="0" r="2.5" fill-opacity="0.5"/>
    </g>
    <g id="snowflake4">
      <line x1="0" y1="-10" x2="0" y2="10" stroke-width="1.2"/>
      <line x1="-10" y1="0" x2="10" y2="0" stroke-width="1.2"/>
      <line x1="-7" y1="-7" x2="7" y2="7" stroke-width="0.8"/>
      <line x1="-7" y1="7" x2="7" y2="-7" stroke-width="0.8"/>
      <line x1="0" y1="-7" x2="2" y2="-9" stroke-width="0.8"/>
      <line x1="0" y1="-7" x2="-2" y2="-9" stroke-width="0.8"/>
      <circle cx="0" cy="0" r="1.8" fill-opacity="0.4"/>
    </g>
  </defs>
  <g filter="url(#frostGlow)">
    <g transform="translate(10,10)">
      <use href="#snowflake6" stroke="url(#iceGrad1)" fill="url(#iceGrad1)" opacity="0.9"/>
    </g>
    <g transform="translate(90,10)">
      <use href="#snowflake6" stroke="url(#iceGrad2)" fill="url(#iceGrad2)" opacity="0.9"/>
    </g>
    <g transform="translate(10,90)">
      <use href="#snowflake6" stroke="url(#iceGrad2)" fill="url(#iceGrad2)" opacity="0.9"/>
