  </g>
  <g filter="url(#iceGlow)" opacity="0.7">
    <g transform="translate(25,6)">
      <use href="#snowflake4" stroke="#3b82f6" fill="#3b82f6" scale(0.6)"/>
    </g>
    <g transform="translate(75,6)">
      <use href="#snowflake4" stroke="#3b82f6" fill="#3b82f6" scale(0.6)"/>
    </g>
    <g transform="translate(6,25)">
      <use href="#snowflake4" stroke="#3b82f6" fill="#3b82f6" scale(0.6)"/>
    </g>
    <g transform="translate(94,25)">
      <use href="#snowflake4" stroke="#3b82f6" fill="#3b82f6" scale(0.6)"/>
    </g>
    <g transform="translate(6,75)">
      <use href="#snowflake4" stroke="#3b82f6" fill="#3b82f6" scale(0.6)"/>
    </g>
    <g transform="translate(94,75)">
      <use href="#snowflake4" stroke="#3b82f6" fill="#3b82f6" scale(0.6)"/>
    </g>
    <g transform="translate(25,94)">
      <use href="#snowflake4" stroke="#3b82f6" fill="#3b82f6" scale(0.6)"/>
    </g>
    <g transform="translate(75,94)">
      <use href="#snowflake4" stroke="#3b82f6" fill="#3b82f6" scale(0.6)"/>
    </g>
  </g>
  <g fill="#93c5fd" opacity="0.5">
    <circle cx="10" cy="30" r="1.5"/>
    <circle cx="90" cy="30" r="1.5"/>
    <circle cx="10" cy="70" r="1.5"/>
    <circle cx="90" cy="70" r="1.5"/>
    <circle cx="30" cy="10" r="1.2"/>
    <circle cx="70" cy="10" r="1.2"/>
    <circle cx="30" cy="90" r="1.2"/>
    <circle cx="70" cy="90" r="1.2"/>
  </g>
  <g fill="#60a5fa" opacity="0.3">
    <circle cx="18" cy="18" r="0.8"/>
    <circle cx="82" cy="18" r="0.8"/>
    <circle cx="18" cy="82" r="0.8"/>
    <circle cx="82" cy="82" r="0.8"/>
    <circle cx="50" cy="15" r="0.6"/>
    <circle cx="15" cy="50" r="0.6"/>
    <circle cx="85" cy="50" r="0.6"/>
    <circle cx="50" cy="85" r="0.6"/>
  </g>
